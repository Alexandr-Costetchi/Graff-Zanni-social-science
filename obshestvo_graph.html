<head>
<meta charset="UTF-8">
<title>Обществознание — Граф ЕГЭ 2026</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
header{display:flex;align-items:center;gap:8px;padding:7px 14px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0;flex-wrap:wrap}
.logo{font-size:14px;font-weight:700;white-space:nowrap}.logo span{color:#58a6ff}
.sw{position:relative;min-width:150px;max-width:240px;flex:1}
.sw input{width:100%;padding:5px 10px 5px 26px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:12px;outline:none}
.sw input:focus{border-color:#58a6ff}
.si{position:absolute;left:7px;top:50%;transform:translateY(-50%);opacity:.45;font-size:11px}
.filters{display:flex;gap:4px;flex-wrap:wrap}
.fb{padding:3px 8px;border-radius:20px;border:1px solid;font-size:11px;cursor:pointer;background:transparent;transition:opacity .15s}
.fb.active{opacity:1}.fb:not(.active){opacity:.3}
.stats{margin-left:auto;font-size:11px;color:#8b949e;white-space:nowrap}
main{display:flex;flex:1;overflow:hidden;position:relative}
#graph{flex:1;background:#0d1117}
#sb{width:310px;background:#161b22;border-left:1px solid #30363d;display:flex;flex-direction:column;overflow:hidden}
.sb-hdr{padding:10px 13px 7px;border-bottom:1px solid #30363d;font-size:10px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.6px}
#nd{padding:12px;flex:1;overflow-y:auto}
.dt{font-size:14px;font-weight:700;margin-bottom:5px;line-height:1.35}
.dnum{font-size:11px;color:#6e7681;margin-bottom:4px}
.dtype{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin-bottom:8px}
.ddesc{font-size:12px;line-height:1.65;color:#c9d1d9;margin-bottom:10px}
.dege{background:#0d1117;border-left:3px solid #e3b341;padding:6px 9px;border-radius:4px;font-size:11px;color:#e3b341;margin-bottom:10px;line-height:1.55}
.dsec h4{font-size:10px;text-transform:uppercase;color:#6e7681;letter-spacing:.4px;margin-bottom:5px;margin-top:10px}
.ei{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid #21262d;font-size:11px}
.el{font-size:9px;padding:1px 5px;border-radius:8px;background:#21262d;color:#8b949e;white-space:nowrap;flex-shrink:0}
.ph{text-align:center;color:#3b434e;margin-top:40px;font-size:12px;line-height:1.8}
.ph .ico{font-size:26px;margin-bottom:6px}
#leg{padding:9px 13px;border-top:1px solid #30363d;flex-shrink:0}
.lt{font-size:10px;text-transform:uppercase;color:#6e7681;letter-spacing:.5px;margin-bottom:6px}
.lg{display:flex;flex-wrap:wrap;gap:5px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#8b949e}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#ctl{position:absolute;bottom:16px;left:14px;display:flex;flex-direction:column;gap:4px}
.cb{width:30px;height:30px;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cb:hover{background:#21262d}
#stabs{position:absolute;top:8px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:10;flex-wrap:nowrap}
.stab{padding:4px 10px;border-radius:16px;border:1px solid;font-size:10px;font-weight:600;cursor:pointer;background:#161b22;white-space:nowrap;transition:opacity .15s}


/* ── HIERARCHY ACCORDION ───────────────────────────────── */
.hier-wrap{margin-top:12px;border-top:1px solid #30363d;padding-top:10px}
.hier-title{font-size:11px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.cat-card{margin:4px 0;border-radius:6px;overflow:hidden;border:1px solid #21262d}
.cat-head{padding:7px 10px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:11.5px;font-weight:600;user-select:none;transition:filter .15s}
.cat-head:hover{filter:brightness(1.15)}
.cat-arr{font-size:10px;opacity:.7;transition:transform .2s}
.cat-arr.open{transform:rotate(90deg)}
.cat-body{display:none;padding:6px 10px 8px;background:#0d1117;border-top:1px solid #21262d}
.cat-body.open{display:block}
.cat-item{font-size:11px;color:#c9d1d9;padding:2px 0 2px 6px;border-bottom:1px solid #161b22;display:flex;gap:5px;line-height:1.4}
.cat-item:last-child{border-bottom:none}
.cat-item::before{content:'·';color:#58a6ff;flex-shrink:0;font-size:14px;line-height:1.2}
/* category colours */
.ch-terms  .cat-head{background:#1c2128;color:#e3b341}
.ch-defs   .cat-head{background:#1c2128;color:#79c0ff}
.ch-feats  .cat-head{background:#1c2128;color:#3fb950}
.ch-princs .cat-head{background:#1c2128;color:#ff7b72}
.ch-osoben .cat-head{background:#1c2128;color:#d2a8ff}
.ch-types  .cat-head{background:#1c2128;color:#ffa657}
.ch-forms  .cat-head{background:#1c2128;color:#f0883e}

.dmat-block{margin-top:10px;border-top:1px solid #30363d;padding-top:8px}
.dmat-title{font-size:10px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px}
.dmat-link{display:flex;align-items:center;gap:6px;padding:5px 8px;background:#0d1117;border:1px solid #30363d;border-radius:6px;margin-bottom:4px;text-decoration:none;color:#58a6ff;font-size:11px;transition:border-color .2s,background .2s}
.dmat-link:hover{background:#161b22;border-color:#58a6ff;color:#79c0ff}
.dmat-ico{font-size:14px;flex-shrink:0}
.dmat-name{flex:1;line-height:1.3}
/* ── TAG SYSTEM ─────────────────────────────────────────────── */
.dtags{display:flex;flex-wrap:wrap;gap:4px;margin:6px 0 8px;align-items:center}
.dtag{padding:2px 7px;border-radius:10px;font-size:12px;background:#21262d;color:#c9d1d9;white-space:nowrap;line-height:1.4}
.dtag-diff{font-weight:600;font-size:11px}
.dtag-imp{color:#e3b341;font-size:13px;letter-spacing:-1px}
.dtag-traps{background:#2d1212;color:#ff7b72}
.dtag-mem{background:#0c1f3d;color:#79c0ff}
.diff-btn{padding:3px 7px;border-radius:14px;border:1px solid #30363d;font-size:11px;cursor:pointer;background:#0d1117;color:#8b949e;transition:all .2s;margin-left:2px}
.diff-btn:hover,.diff-btn.active{border-color:#58a6ff;color:#e6edf3;background:#161b22}
.imp-filter{display:flex;gap:3px;align-items:center;margin-left:6px}
.imp-btn{padding:3px 6px;border-radius:12px;border:1px solid #30363d;font-size:10px;cursor:pointer;background:#0d1117;color:#8b949e;transition:all .2s;white-space:nowrap}
.imp-btn:hover,.imp-btn.active{border-color:#e3b341;color:#e3b341;background:#161b22}

</style>
</head>

<header>
  <div class="logo">📚 Обществознание <span>ЕГЭ 2026</span></div>

    <button class="diff-btn" data-mode="difficulty" onclick="applyColorMode('difficulty')" title="Цвет по сложности">🎨 Сложность</button>
  </div>
  <div class="imp-filter">
    <button class="imp-btn" data-imp="1" onclick="applyImpFilter(1)" title="Фильтр: любые">⭐</button>
    <button class="imp-btn" data-imp="2" onclick="applyImpFilter(2)" title="Фильтр: часто">⭐⭐</button>
    <button class="imp-btn" data-imp="3" onclick="applyImpFilter(3)" title="Фильтр: обязательные">⭐⭐⭐</button>
  </div>
</header>
<main>
  <div id="graph"></div>
  <div id="stabs"></div>
  <div id="ctl">
    <button class="cb" onclick="network.moveTo({scale:network.getScale()*1.3})">+</button>
    <button class="cb" onclick="network.moveTo({scale:network.getScale()*0.77})">−</button>
    <button class="cb" onclick="network.fit({animation:{duration:600}})">⊡</button>
  </div>
  <div id="sb">
    <div class="sb-hdr">Детали темы</div>
    <div id="nd"><div class="ph"><div class="ico">📚</div>Кликните на тему<br>чтобы увидеть содержание</div></div>
    <div id="leg">
      <div class="lt">Цвета разделов</div>
      <div class="lg">
        <div class="li"><div class="ld" style="background:#e3b341"></div>Раздел</div>

        <div class="li"><div class="ld" style="background:#ff7b72"></div>5 Право</div>
      </div>
    </div>
  </div>
</main>

// ── BUILD VIS.JS ─────────────────────────────────────────────────
function nc(n){
  const s=SEC[n.sec]||SEC.s1;
  if(n.god) return {background:s.bg,border:s.c,highlight:{background:s.bg,border:'#fff700'}};
  return {background:s.bg,border:s.c,highlight:{background:s.bg,border:s.c}};
}

const visNodes=new vis.DataSet(NODES.map(n=>({
  id:n.id, label:n.label, title:n.short||'',
  color:nc(n),
  font:{color:SEC[n.sec]?.c||'#e6edf3', size:n.god?13:11, bold:n.god, face:'sans-serif'},
  size:n.god?28:14,
  shape:n.god?'hexagon':'dot',
  _d:n,
})));

const visEdges=new vis.DataSet(EDGES.map((e,i)=>{
  // Межраздельное ребро: оба конца — темы из разных разделов
  const isCross=e.from&&e.to&&e.from[0]==='t'&&e.to[0]==='t'&&e.from[1]!==e.to[1];
  return {
    id:i, from:e.from, to:e.to,
    label:isCross?e.label||'':e.label||'',
    color:isCross
      ?{color:'#58a6ff',opacity:0.55,highlight:'#79c0ff'}
      :{color:'#3b434e',highlight:'#8b949e'},
    font:{color:isCross?'#58a6ff':'#6e7681',size:8,align:'middle'},
    arrows:{to:{enabled:true,scaleFactor:isCross?0.35:0.45}},
    width:isCross?1.5:e.label===''?1.5:1,
    dashes:e.from.startsWith('S')?false:isCross?[4,4]:true,
    _d:e,
  };
}));

const net=new vis.Network(
  document.getElementById('graph'),
  {nodes:visNodes, edges:visEdges},
  {
    physics:{enabled:true, solver:'forceAtlas2Based',
      forceAtlas2Based:{gravitationalConstant:-100, centralGravity:0.003, springLength:150, springConstant:0.05},
      stabilization:{iterations:400}},
    interaction:{hover:true, tooltipDelay:200},
    edges:{smooth:{type:'dynamic'}},
  }
);
window.network=net;

function upStats(){
  document.getElementById('stats').textContent=`${visNodes.length} тем · ${visEdges.length} связей`;
}
upStats();


// ── HIERARCHY RENDER ──────────────────────────────────────────
function hierHtml(nid){
  const td=TDATA[nid];
  if(!td)return'';
  const cats=[
    {k:'terms', label:'📝 Термины'},
    {k:'defs',  label:'📖 Понятия'},
    {k:'feats', label:'✅ Признаки'},
    {k:'princs',label:'⚖️ Принципы'},
    {k:'osoben',label:'🔍 Особенности'},
    {k:'types', label:'📂 Виды'},
    {k:'forms', label:'🔄 Формы'},
  ];
  let html='<div class="hier-wrap"><div class="hier-title">📚 Структура темы</div>';
  cats.forEach(c=>{
    const items=td[c.k];
    if(!items||!items.length)return;
    html+=`<div class="cat-card ch-${c.k}">
      <div class="cat-head" onclick="toggleCat(this)">
        <span>${c.label} <span style="opacity:.5;font-weight:400;font-size:10px">(${items.length})</span></span>
        <span class="cat-arr">▶</span>
      </div>
      <div class="cat-body">
        ${items.map(i=>`<div class="cat-item">${i}</div>`).join('')}
      </div>
    </div>`;
  });
  html+='</div>';
  return html;
}
function toggleCat(head){
  const body=head.nextElementSibling;
  const arr=head.querySelector('.cat-arr');
  const open=body.classList.toggle('open');
  arr.classList.toggle('open',open);
}

// ── CLICK ─────────────────────────────────────────────────────────
net.on('click',params=>{
  if(!params.nodes.length){
    document.getElementById('nd').innerHTML='<div class="ph"><div class="ico">📚</div>Кликните на тему</div>';
    return;
  }
  const nid=params.nodes[0];
  const nd=NODES.find(n=>n.id===nid);
  if(!nd) return;
  const s=SEC[nd.sec]||SEC.s1;

  const outE=EDGES.filter(e=>e.from===nid&&e.label!=='');
  const inE=EDGES.filter(e=>e.to===nid&&e.label!=='');

  function eRow(e,dir){
    const oid=dir==='out'?e.to:e.from;
    const on=NODES.find(n=>n.id===oid);
    const oc=SEC[on?.sec]?.c||'#8b949e';
    return `<div class="ei"><span style="color:${oc};font-weight:600;flex-shrink:0">${on?.num?`[${on.num}] `:''}</span><span style="color:${oc}">${on?.short||on?.label?.replace('\n',' ')||oid}</span><span class="el">${e.label}</span></div>`;
  }

  const keysHtml=nd.keys?.map(k=>`<span style="display:inline-block;padding:2px 6px;background:#21262d;border-radius:8px;font-size:10px;color:#8b949e;margin:2px">${k}</span>`).join('')||'';
  const tg=TAGS[nid]||null;
  const dc=tg?DIFF_COL[tg.color]:null;
  const tagHtml=tg?`<div class="dtags">
    <span class="dtag" title="Сфера общества">${tg.sphere}</span>
    <span class="dtag" title="Уровень сложности">${tg.lvl}</span>
    <span class="dtag dtag-imp" title="Важность для ЕГЭ">${IMP_STR[tg.imp]}</span>
    ${tg.traps?`<span class="dtag dtag-traps" title="Ловушки ЕГЭ">${tg.traps}</span>`:''}
    <span class="dtag dtag-mem" title="Тип запоминания">${tg.mem}</span>
    <span class="dtag dtag-diff" style="background:${dc?.bg||'#21262d'};color:${dc?.c||'#c9d1d9'}" title="Сложность">${tg.color} ${dc?.label||''}</span>
  </div>`:'';


  document.getElementById('nd').innerHTML=`
    ${nd.num?`<div class="dnum">Тема ${nd.num}</div>`:''}
    <div class="dt">${nd.short||nd.label.replace(/\n/g,' ')}</div>
    <span class="dtype" style="background:${s.bg};color:${s.c}">${nd.type==='section'?'РАЗДЕЛ':'ТЕМА'}</span>
    ${tagHtml}
    <div class="ddesc">${nd.desc||''}</div>
    ${nd.ege?`<div class="dege">🎯 ${nd.ege}</div>`:''}
    ${keysHtml?`<div style="margin-bottom:10px">${keysHtml}</div>`:''}
    ${hierHtml(nid)}
    ${outE.length?`<div class="dsec"><h4>→ Связанные темы (${outE.length})</h4>${outE.map(e=>eRow(e,'out')).join('')}</div>`:''}
    ${inE.length?`<div class="dsec"><h4>← Входящие связи (${inE.length})</h4>${inE.map(e=>eRow(e,'in')).join('')}</div>`:''}
    ${nd.mats&&nd.mats.length?`<div class="dmat-block"><div class="dmat-title">📂 Материалы для изучения (${nd.mats.length})</div>${nd.mats.map(m=>`<a class="dmat-link" href="${m.u}" target="_blank"><span class="dmat-ico">${m.i}</span><span class="dmat-name">${m.n}</span></a>`).join('')}</div>`:''}
  `;

  net.focus(nid,{scale:1.4,animation:{duration:500,easingFunction:'easeInOutQuad'}});
});

// ── SEARCH ────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  if(!q){visNodes.forEach(n=>visNodes.update({id:n.id,hidden:false}));return;}
  visNodes.forEach(n=>{
    const d=n._d;
    const m=n.label.toLowerCase().includes(q)
      ||(d?.desc||'').toLowerCase().includes(q)
      ||(d?.keys||[]).some(k=>k.toLowerCase().includes(q))
      ||(d?.num||'').includes(q)
      ||(d?.ege||'').toLowerCase().includes(q);
    visNodes.update({id:n.id,hidden:!m});
  });
});

// ── TYPE FILTERS ─────────────────────────────────────────────────
const active=new Set(['section','s1','s2','s3','s4','s5']);
document.getElementById('filters').addEventListener('click',e=>{
  const btn=e.target.closest('.fb');if(!btn)return;
  const tp=btn.dataset.type;
  if(tp==='section'){
    if(active.has('section'))active.delete('section');else active.add('section');
    btn.classList.toggle('active',active.has('section'));
    NODES.filter(n=>n.type==='section').forEach(n=>visNodes.update({id:n.id,hidden:!active.has('section')}));
  } else {
    if(active.has(tp))active.delete(tp);else active.add(tp);
    btn.classList.toggle('active',active.has(tp));
    NODES.filter(n=>n.sec===tp&&n.type==='topic').forEach(n=>visNodes.update({id:n.id,hidden:!active.has(tp)}));
  }
});


// ── DIFFICULTY COLOR MODE ─────────────────────────────────────
let colorMode='section';
function applyColorMode(mode){
  colorMode=mode;
  document.querySelectorAll('.diff-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.mode===mode);
  });
  visNodes.forEach(vn=>{
    const nd=vn._d;
    if(!nd||nd.type!=='topic')return;
    if(mode==='difficulty'){
      const tg=TAGS[nd.id];
      if(tg){
        const dc=DIFF_COL[tg.color];
        visNodes.update({id:nd.id,color:{background:dc.bg,border:dc.c,highlight:{background:dc.bg,border:dc.c}}});
      }
    } else {
      visNodes.update({id:nd.id,color:nc(nd)});
    }
  });
}

// ── IMPORTANCE FILTER ────────────────────────────────────────
let impFilter=0;
function applyImpFilter(lvl){
  impFilter=impFilter===lvl?0:lvl;
  document.querySelectorAll('.imp-btn').forEach(b=>{
    b.classList.toggle('active',+b.dataset.imp===impFilter);
  });
  visNodes.forEach(vn=>{
    const nd=vn._d;
    if(!nd||nd.type!=='topic')return;
    const tg=TAGS[nd.id];
    const nodeImp=tg?tg.imp:0;
    visNodes.update({id:nd.id,hidden:impFilter>0&&nodeImp<impFilter});
  });
  upStats();
}

// ── SECTION TABS ─────────────────────────────────────────────────
const STABS=[
  {id:'S1',label:'1',title:'Человек',c:'#f0883e'},
  {id:'S2',label:'2',title:'Экономика',c:'#3fb950'},
  {id:'S3',label:'3',title:'Социум',c:'#58a6ff'},
  {id:'S4',label:'4',title:'Политика',c:'#d2a8ff'},
  {id:'S5',label:'5',title:'Право',c:'#ff7b72'},
];

const stEl=document.getElementById('stabs');
stEl.style.cssText='position:absolute;top:10px;right:320px;display:flex;gap:5px;z-index:10';
let selS=null;
STABS.forEach(st=>{
  b.className='stab';
  b.textContent=st.title;
  b.title=st.title;
  b.style.cssText=`color:${st.c};border-color:${st.c};opacity:0.55;padding:4px 10px;border-radius:16px;border:1px solid;font-size:10px;font-weight:600;cursor:pointer;background:#161b22`;
  b.onclick=()=>{
    if(selS===st.id){
      selS=null;
      NODES.forEach(n=>visNodes.update({id:n.id,hidden:false}));
      document.querySelectorAll('.stab').forEach(x=>x.style.opacity='0.55');
    } else {
      selS=st.id;
      const secId=st.id;
      NODES.forEach(n=>{
        const show=n.id===secId||n.sec==='s'+secId[1];
        visNodes.update({id:n.id,hidden:!show});
      });
      document.querySelectorAll('.stab').forEach(x=>x.style.opacity='0.4');
      b.style.opacity='1';
      setTimeout(()=>net.fit({nodes:NODES.filter(n=>n.sec==='s'+secId[1]||n.id===secId).map(n=>n.id),animation:{duration:600}}),50);
    }
  };
  stEl.appendChild(b);
});

net.once('stabilizationIterationsDone',()=>{
  net.setOptions({physics:{enabled:false}});
  net.fit({animation:{duration:800}});
});
</script>
</body>
