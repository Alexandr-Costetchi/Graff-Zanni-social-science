// ── BUILD VIS.JS ─────────────────────────────────────────────────
function nc(n){
  const s=SEC[n.sec]||SEC.s1;
  if(n.god) return {background:s.bg,border:s.c,highlight:{background:s.bg,border:'#fff700'}};
  return {background:s.bg,border:s.c,highlight:{background:s.bg,border:s.c}};
}

const visNodes=new vis.DataSet(NODES.map(n=>({
  id:n.id, label:n.label, title:n.short||'',
  color:nc(n),
  font:{color:SEC[n.sec]?.c||'#e6edf3', size:n.god?13:11, bold:n.god, face:'sans-serif'},
  size:n.god?28:14,
  shape:n.god?'hexagon':'dot',
  _d:n,
})));

const visEdges=new vis.DataSet(EDGES.map((e,i)=>({
  id:i, from:e.from, to:e.to,
  label:e.label||'',
  color:{color:'#3b434e',highlight:'#8b949e'},
  font:{color:'#6e7681',size:8,align:'middle'},
  arrows:{to:{enabled:true,scaleFactor:0.45}},
  width: e.label===''?1.5:1,
  dashes: e.from.startsWith('S')?false:true,
  _d:e,
})));

const net=new vis.Network(
  document.getElementById('graph'),
  {nodes:visNodes, edges:visEdges},
  {
    physics:{enabled:true, solver:'forceAtlas2Based',
      forceAtlas2Based:{gravitationalConstant:-100, centralGravity:0.003, springLength:150, springConstant:0.05},
      stabilization:{iterations:400}},
    interaction:{hover:true, tooltipDelay:200},
    edges:{smooth:{type:'dynamic'}},
  }
);
window.network=net;

function upStats(){
  document.getElementById('stats').textContent=`${visNodes.length} тем · ${visEdges.length} связей`;
}
upStats();

// ── CLICK ─────────────────────────────────────────────────────────
net.on('click',params=>{
  if(!params.nodes.length){
    document.getElementById('nd').innerHTML='<div class="ph"><div class="ico">📚</div>Кликните на тему</div>';
    return;
  }
  const nid=params.nodes[0];
  const nd=NODES.find(n=>n.id===nid);
  if(!nd) return;
  const s=SEC[nd.sec]||SEC.s1;

  const outE=EDGES.filter(e=>e.from===nid&&e.label!=='');
  const inE=EDGES.filter(e=>e.to===nid&&e.label!=='');

  function eRow(e,dir){
    const oid=dir==='out'?e.to:e.from;
    const on=NODES.find(n=>n.id===oid);
    const oc=SEC[on?.sec]?.c||'#8b949e';
    return `<div class="ei"><span style="color:${oc};font-weight:600;flex-shrink:0">${on?.num?`[${on.num}] `:''}</span><span style="color:${oc}">${on?.short||on?.label?.replace('\n',' ')||oid}</span><span class="el">${e.label}</span></div>`;
  }

  const keysHtml=nd.keys?.map(k=>`<span style="display:inline-block;padding:2px 6px;background:#21262d;border-radius:8px;font-size:10px;color:#8b949e;margin:2px">${k}</span>`).join('')||'';

  document.getElementById('nd').innerHTML=`
    ${nd.num?`<div class="dnum">Тема ${nd.num}</div>`:''}
    <div class="dt">${nd.short||nd.label.replace(/\n/g,' ')}</div>
    <span class="dtype" style="background:${s.bg};color:${s.c}">${nd.type==='section'?'РАЗДЕЛ':'ТЕМА'}</span>
    <div class="ddesc">${nd.desc||''}</div>
    ${nd.ege?`<div class="dege">🎯 ${nd.ege}</div>`:''}
    ${keysHtml?`<div style="margin-bottom:10px">${keysHtml}</div>`:''}
    ${outE.length?`<div class="dsec"><h4>→ Связанные темы (${outE.length})</h4>${outE.map(e=>eRow(e,'out')).join('')}</div>`:''}
    ${inE.length?`<div class="dsec"><h4>← Входящие связи (${inE.length})</h4>${inE.map(e=>eRow(e,'in')).join('')}</div>`:''}
  `;

  net.focus(nid,{scale:1.4,animation:{duration:500,easingFunction:'easeInOutQuad'}});
});

// ── SEARCH ────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  if(!q){visNodes.forEach(n=>visNodes.update({id:n.id,hidden:false}));return;}
  visNodes.forEach(n=>{
    const d=n._d;
    const m=n.label.toLowerCase().includes(q)
      ||(d?.desc||'').toLowerCase().includes(q)
      ||(d?.keys||[]).some(k=>k.toLowerCase().includes(q))
      ||(d?.num||'').includes(q)
      ||(d?.ege||'').toLowerCase().includes(q);
    visNodes.update({id:n.id,hidden:!m});
  });
});

// ── TYPE FILTERS ─────────────────────────────────────────────────
const active=new Set(['section','s1','s2','s3','s4','s5']);
document.getElementById('filters').addEventListener('click',e=>{
  const btn=e.target.closest('.fb');if(!btn)return;
  const tp=btn.dataset.type;
  if(tp==='section'){
    if(active.has('section'))active.delete('section');else active.add('section');
    btn.classList.toggle('active',active.has('section'));
    NODES.filter(n=>n.type==='section').forEach(n=>visNodes.update({id:n.id,hidden:!active.has('section')}));
  } else {
    if(active.has(tp))active.delete(tp);else active.add(tp);
    btn.classList.toggle('active',active.has(tp));
    NODES.filter(n=>n.sec===tp&&n.type==='topic').forEach(n=>visNodes.update({id:n.id,hidden:!active.has(tp)}));
  }
});

// ── SECTION TABS ─────────────────────────────────────────────────
const STABS=[
  {id:'S1',label:'1',title:'Человек',c:'#f0883e'},
  {id:'S2',label:'2',title:'Экономика',c:'#3fb950'},
  {id:'S3',label:'3',title:'Социум',c:'#58a6ff'},
  {id:'S4',label:'4',title:'Политика',c:'#d2a8ff'},
  {id:'S5',label:'5',title:'Право',c:'#ff7b72'},
];

const stEl=document.getElementById('stabs');
stEl.style.cssText='position:absolute;top:10px;right:320px;display:flex;gap:5px;z-index:10';
let selS=null;
STABS.forEach(st=>{
  const b=document.createElement('button');
  b.className='stab';
  b.textContent=st.title;
  b.title=st.title;
  b.style.cssText=`color:${st.c};border-color:${st.c};opacity:0.55;padding:4px 10px;border-radius:16px;border:1px solid;font-size:10px;font-weight:600;cursor:pointer;background:#161b22`;
  b.onclick=()=>{
    if(selS===st.id){
      selS=null;
      NODES.forEach(n=>visNodes.update({id:n.id,hidden:false}));
      document.querySelectorAll('.stab').forEach(x=>x.style.opacity='0.55');
    } else {
      selS=st.id;
      const secId=st.id;
      NODES.forEach(n=>{
        const show=n.id===secId||n.sec==='s'+secId[1];
        visNodes.update({id:n.id,hidden:!show});
      });
      document.querySelectorAll('.stab').forEach(x=>x.style.opacity='0.4');
      b.style.opacity='1';
      setTimeout(()=>net.fit({nodes:NODES.filter(n=>n.sec==='s'+secId[1]||n.id===secId).map(n=>n.id),animation:{duration:600}}),50);
    }
  };
  stEl.appendChild(b);
});

net.once('stabilizationIterationsDone',()=>{
  net.setOptions({physics:{enabled:false}});
  net.fit({animation:{duration:800}});
});
</script>
