<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>История России — Граф знаний ЕГЭ 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/vis/4.21.0/vis.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d1117;color:#e6edf3;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}

header{display:flex;align-items:center;gap:10px;padding:8px 16px;background:#161b22;border-bottom:1px solid #30363d;flex-shrink:0;flex-wrap:wrap}
.logo{font-size:15px;font-weight:700;white-space:nowrap}
.logo span{color:#e3b341}

.search-wrap{position:relative;min-width:160px;max-width:280px;flex:1}
.search-wrap input{width:100%;padding:5px 10px 5px 28px;background:#0d1117;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:12px;outline:none}
.search-wrap input:focus{border-color:#e3b341}
.s-icon{position:absolute;left:8px;top:50%;transform:translateY(-50%);opacity:.5;font-size:12px}

.filters{display:flex;gap:5px;flex-wrap:wrap}
.fb{padding:3px 9px;border-radius:20px;border:1px solid;font-size:11px;cursor:pointer;background:transparent;transition:opacity .15s}
.fb.active{opacity:1}.fb:not(.active){opacity:.35}

.stats{margin-left:auto;font-size:11px;color:#8b949e;white-space:nowrap}

main{display:flex;flex:1;overflow:hidden;position:relative}
#graph{flex:1;background:#0d1117}

/* sidebar */
#sb{width:310px;background:#161b22;border-left:1px solid #30363d;display:flex;flex-direction:column;overflow:hidden}
.sb-hdr{padding:12px 14px 8px;border-bottom:1px solid #30363d;font-size:11px;font-weight:600;color:#8b949e;text-transform:uppercase;letter-spacing:.6px}
#nd{padding:14px;flex:1;overflow-y:auto;font-size:13px}
.dt{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.3}
.dtype{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;margin-bottom:8px}
.ddesc{font-size:12px;line-height:1.6;color:#8b949e;margin-bottom:10px}
.ddate{font-size:12px;color:#e3b341;margin-bottom:10px;font-weight:600}
.dsec h4{font-size:10px;text-transform:uppercase;color:#6e7681;letter-spacing:.5px;margin-bottom:6px;margin-top:10px}
.ei{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid #21262d;font-size:11px}
.el{font-size:9px;padding:1px 5px;border-radius:8px;background:#21262d;color:#8b949e;white-space:nowrap}
.ph{text-align:center;color:#3b434e;margin-top:50px;font-size:12px;line-height:1.7}
.ph .ico{font-size:28px;margin-bottom:8px}

/* legend */
#leg{padding:10px 14px;border-top:1px solid #30363d}
.lt{font-size:10px;text-transform:uppercase;color:#6e7681;letter-spacing:.5px;margin-bottom:7px}
.li{display:flex;align-items:center;gap:7px;font-size:11px;color:#8b949e;margin-bottom:4px}
.ld{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* controls */
#ctl{position:absolute;bottom:16px;left:16px;display:flex;flex-direction:column;gap:5px}
.cb{width:32px;height:32px;background:#161b22;border:1px solid #30363d;border-radius:6px;color:#e6edf3;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.cb:hover{background:#21262d}

/* timeline bar */
#tl{position:absolute;bottom:0;left:0;right:310px;background:#161b22;border-top:1px solid #30363d;padding:6px 60px;display:flex;align-items:center;gap:0;overflow-x:auto;height:36px}
.tp{flex-shrink:0;font-size:10px;color:#8b949e;cursor:pointer;padding:2px 6px;border-radius:4px;white-space:nowrap;border:1px solid transparent;transition:all .15s}
.tp:hover,.tp.sel{background:#21262d;border-color:#30363d;color:#e6edf3}
.tp-sep{color:#30363d;margin:0 2px;font-size:10px;flex-shrink:0}
</style>
</head>
<body>
<header>
  <div class="logo">🗺️ История России <span>ЕГЭ 2026</span></div>
  <div class="search-wrap"><span class="s-icon">🔍</span><input id="search" placeholder="Найти правителя, событие..."></div>
  <div class="filters" id="filters">
    <button class="fb active" data-type="ruler" style="color:#e3b341;border-color:#e3b341">👑 Правители</button>
    <button class="fb active" data-type="dynasty" style="color:#f78166;border-color:#f78166">🏰 Династии</button>
    <button class="fb active" data-type="event" style="color:#3fb950;border-color:#3fb950">⚔️ События</button>
    <button class="fb active" data-type="reform" style="color:#58a6ff;border-color:#58a6ff">📜 Реформы</button>
    <button class="fb active" data-type="period" style="color:#d2a8ff;border-color:#d2a8ff">📅 Периоды</button>
    <button class="fb active" data-type="war" style="color:#ff7b72;border-color:#ff7b72">🔥 Войны</button>
  </div>
  <div class="stats" id="stats"></div>
</header>

<main>
  <div id="graph"></div>
  <div id="ctl">
    <button class="cb" onclick="network.moveTo({scale:network.getScale()*1.3})">+</button>
    <button class="cb" onclick="network.moveTo({scale:network.getScale()*0.77})">−</button>
    <button class="cb" onclick="network.fit({animation:{duration:600}})">⊡</button>
  </div>
  <div id="tl" id="timeline"></div>
  <div id="sb">
    <div class="sb-hdr">Детали</div>
    <div id="nd"><div class="ph"><div class="ico">👑</div>Кликните на узел<br>чтобы увидеть детали</div></div>
    <div id="leg">
      <div class="lt">Легенда</div>
      <div class="li"><div class="ld" style="background:#e3b341"></div>Правитель</div>
      <div class="li"><div class="ld" style="background:#f78166"></div>Династия</div>
      <div class="li"><div class="ld" style="background:#3fb950"></div>Событие</div>
      <div class="li"><div class="ld" style="background:#58a6ff"></div>Реформа</div>
      <div class="li"><div class="ld" style="background:#d2a8ff"></div>Период</div>
      <div class="li"><div class="ld" style="background:#ff7b72"></div>Война</div>
    </div>
  </div>
</main>

<script>
const T={
  ruler:  {c:'#e3b341',bg:'#3b2d00'},
  dynasty:{c:'#f78166',bg:'#5c1c0e'},
  event:  {c:'#3fb950',bg:'#0c3321'},
  reform: {c:'#58a6ff',bg:'#0c2d6b'},
  period: {c:'#d2a8ff',bg:'#2d1f5e'},
  war:    {c:'#ff7b72',bg:'#5c1010'},
};

// ══════════════════════════════════════════════════════
// NODES
// ══════════════════════════════════════════════════════
const NODES=[
// ПЕРИОДЫ
{id:'p_drevrus', type:'period', label:'Древняя Русь\n862–1132', dates:'862–1132', desc:'Киевская Русь. Единое государство восточных славян со столицей в Киеве.', egе:'ЕГЭ: периодизация, первые князья, крещение'},
{id:'p_razdro',  type:'period', label:'Раздробленность\n1132–1237', dates:'1132–1237', desc:'Распад Киевской Руси на удельные княжества. Ослабление центральной власти.', ege:'ЕГЭ: причины, Владимиро-Суздаль, Новгород'},
{id:'p_orda',    type:'period', label:'Монгольское иго\n1237–1480', dates:'1237–1480', desc:'Зависимость от Золотой Орды. Собирание земель вокруг Москвы.', ege:'ЕГЭ: Батый, ярлык, Куликовская битва'},
{id:'p_moscow',  type:'period', label:'Московское царство\n1480–1613', dates:'1480–1613', desc:'Конец зависимости от Орды. Централизация власти. Опричнина. Смута.', ege:'ЕГЭ: Иван III, Иван IV, Смутное время'},
{id:'p_romanov', type:'period', label:'Ранние Романовы\n1613–1689', dates:'1613–1689', desc:'Избрание Михаила Романова. Соборное уложение. Воссоединение с Украиной.', ege:'ЕГЭ: Соборное уложение 1649, Раскол, Медный бунт'},
{id:'p_empire18',type:'period', label:'Империя XVIII в.\n1689–1796', dates:'1689–1796', desc:'Петровские преобразования. Эпоха дворцовых переворотов. Просвещённый абсолютизм.', ege:'ЕГЭ: реформы Петра I, Семилетняя война, Пугачёв'},
{id:'p_empire19',type:'period', label:'Империя XIX в.\n1796–1894', dates:'1796–1894', desc:'Отечественная война 1812. Декабристы. Великие реформы. Реакция Александра III.', ege:'ЕГЭ: 1812 г., отмена крепостного права, народничество'},
{id:'p_late',    type:'period', label:'Поздняя империя\n1894–1917', dates:'1894–1917', desc:'Революции 1905 и 1917 гг. Первая мировая война. Столыпинские реформы.', ege:'ЕГЭ: Кровавое воскресенье, Дума, Февральская революция'},
{id:'p_soviet',  type:'period', label:'СССР\n1917–1991', dates:'1917–1991', desc:'Большевистская революция. Гражданская война. Сталинизм. Оттепель. Застой. Распад.', ege:'ЕГЭ: НЭП, коллективизация, ВОВ, «Оттепель»'},

// ДИНАСТИИ
{id:'d_ryurik', type:'dynasty', label:'Рюриковичи\n862–1598', dates:'862–1598', desc:'Первая правящая династия Руси. Основана легендарным варягом Рюриком. Правила 736 лет.', ege:'ЕГЭ: последний Рюрикович — Фёдор Иоаннович (1598)'},
{id:'d_romanov',type:'dynasty', label:'Романовы\n1613–1917', dates:'1613–1917', desc:'Вторая и последняя правящая династия России. Избрана Земским собором 1613 г. Правила 304 года.', ege:'ЕГЭ: первый — Михаил I, последний — Николай II'},

// РЮРИКОВИЧИ — правители
{id:'r_ryurik',  type:'ruler', label:'Рюрик\n862–879', dates:'862–879', desc:'Легендарный основатель Древнерусского государства. Варяг, призванный новгородцами.', ege:'ЕГЭ: 862 г. — «призвание варягов»', god:true},
{id:'r_oleg',    type:'ruler', label:'Олег Вещий\n879–912', dates:'879–912', desc:'Объединил Новгород и Киев. В 882 г. захватил Киев — «матерь городов русских». Поход на Константинополь 907 г.', ege:'ЕГЭ: 907 — договор с Византией'},
{id:'r_igor',    type:'ruler', label:'Игорь\n912–945', dates:'912–945', desc:'Сын Рюрика. Убит древлянами при повторном сборе полюдья.', ege:'ЕГЭ: 945 — полюдье, гибель от древлян'},
{id:'r_olga',    type:'ruler', label:'Ольга\n945–964', dates:'945–964', desc:'Жена Игоря. Жестоко отомстила древлянам. Упорядочила систему сбора податей — уроки и погосты. Крестилась в Константинополе.', ege:'ЕГЭ: уроки и погосты, крещение Ольги 957 г.'},
{id:'r_svyat',   type:'ruler', label:'Святослав I\n964–972', dates:'964–972', desc:'«Воин на троне». Разгромил Хазарский каганат. Балканские походы. Убит печенегами у Днепровских порогов.', ege:'ЕГЭ: разгром хазар 965 г., гибель 972 г.'},
{id:'r_vlad',    type:'ruler', label:'Владимир I\n978–1015', dates:'978–1015', desc:'Крестил Русь в 988 г. Строил оборонительные рубежи против печенегов. «Солнышко».', ege:'ЕГЭ: 988 — крещение Руси ★', god:true},
{id:'r_yaroslav',type:'ruler', label:'Ярослав Мудрый\n1019–1054', dates:'1019–1054', desc:'Расцвет Киевской Руси. «Русская правда» — первый письменный свод законов. Митрополит-грек заменён русским Иларионом.', ege:'ЕГЭ: «Русская правда», дата смерти 1054 г.', god:true},
{id:'r_vsevolod',type:'ruler', label:'Всеволод III «Большое Гнездо»\n1176–1212', dates:'1176–1212', desc:'Сильнейший князь Владимирского княжества. 8 сыновей — отсюда прозвище.', ege:'ЕГЭ: возвышение Владимира'},
{id:'r_alexnevsk',type:'ruler',label:'Александр Невский\n1252–1263', dates:'1252–1263', desc:'Победил шведов на Неве (1240) и ливонских рыцарей на Чудском озере (1242). Проводил политику сотрудничества с Ордой.', ege:'ЕГЭ: Невская битва 1240, Ледовое побоище 1242 ★', god:true},
{id:'r_danila',  type:'ruler', label:'Даниил Московский\n1276–1303', dates:'1276–1303', desc:'Основатель Московского княжества. Сын Александра Невского.', ege:'ЕГЭ: начало возвышения Москвы'},
{id:'r_ivan1',   type:'ruler', label:'Иван I Калита\n1325–1340', dates:'1325–1340', desc:'«Собиратель земель». Получил право сбора ордынской дани. Перенёс митрополию в Москву.', ege:'ЕГЭ: перенос митрополии, «Калита» = кошель'},
{id:'r_dmitry',  type:'ruler', label:'Дмитрий Донской\n1359–1389', dates:'1359–1389', desc:'Победил Мамая на Куликовом поле (1380). Первая крупная победа над Ордой.', ege:'ЕГЭ: 1380 — Куликовская битва ★', god:true},
{id:'r_ivan3',   type:'ruler', label:'Иван III\n1462–1505', dates:'1462–1505', desc:'«Великий». Окончательно свергнул монгольское иго (1480). Присоединил Новгород (1478), Тверь. Принял титул «Государя всея Руси».', ege:'ЕГЭ: 1480 — «стояние на Угре» ★, 1497 — Судебник', god:true},
{id:'r_vasily3', type:'ruler', label:'Василий III\n1505–1533', dates:'1505–1533', desc:'Завершил объединение русских земель. Присоединил Псков (1510), Рязань (1521), Смоленск (1514).', ege:'ЕГЭ: завершение объединения'},
{id:'r_ivan4',   type:'ruler', label:'Иван IV Грозный\n1547–1584', dates:'1547–1584', desc:'Первый русский царь. Реформы Избранной рады. Опричнина (1565–1572). Завоевание Казани (1552) и Астрахани (1556). Ливонская война.', ege:'ЕГЭ: 1547 — первый царь, 1552 — Казань, опричнина ★', god:true},
{id:'r_fedor1',  type:'ruler', label:'Фёдор Иоаннович\n1584–1598', dates:'1584–1598', desc:'Сын Ивана IV. Слабый правитель, реально управлял Борис Годунов. Учреждение патриаршества (1589). Последний Рюрикович.', ege:'ЕГЭ: 1589 — патриаршество, конец Рюриковичей'},
{id:'r_godunov', type:'ruler', label:'Борис Годунов\n1598–1605', dates:'1598–1605', desc:'Избран Земским собором. Голод 1601–1603. Начало Смутного времени. Умер во время похода Лжедмитрия I.', ege:'ЕГЭ: 1597 — прикрепление крестьян, Смута'},
// Смута
{id:'r_smutnoe', type:'event', label:'Смутное время\n1598–1613', dates:'1598–1613', desc:'Династический кризис, иностранная интервенция, самозванцы. Лжедмитрий I и II, Семибоярщина, Народные ополчения.', ege:'ЕГЭ: Лжедмитрий I, ополчение Минина и Пожарского 1612 ★'},

// РОМАНОВЫ
{id:'r_mikhail', type:'ruler', label:'Михаил I\n1613–1645', dates:'1613–1645', desc:'Первый царь из рода Романовых. Избран Земским собором в 1613 г. при реальной власти отца — патриарха Филарета.', ege:'ЕГЭ: 1613 — начало Романовых ★'},
{id:'r_alexei',  type:'ruler', label:'Алексей «Тишайший»\n1645–1676', dates:'1645–1676', desc:'Соборное уложение 1649 г. — окончательное закрепощение крестьян. Воссоединение с Украиной (1654). Церковный раскол (Никон). Восстание Разина.', ege:'ЕГЭ: 1649 — Соборное уложение ★, 1654 — Переяславская рада', god:true},
{id:'r_fedor3',  type:'ruler', label:'Фёдор III\n1676–1682', dates:'1676–1682', desc:'Отменил местничество (1682). Война с Турцией.', ege:'ЕГЭ: 1682 — отмена местничества'},
{id:'r_sophia',  type:'ruler', label:'Правительница Софья\n1682–1689', dates:'1682–1689', desc:'Регентша при малолетних Иване V и Петре I. Вечный мир с Польшей (1686). Нептунные (Крымские) походы Голицына.', ege:'ЕГЭ: Вечный мир 1686'},
{id:'r_peter1',  type:'ruler', label:'Пётр I\n1682–1725', dates:'1682–1725', desc:'«Великий». Реформы всех сфер. Северная война (1700–1721). Провозглашение империи (1721). Петербург — новая столица.', ege:'ЕГЭ: 1700–1721 — Северная война ★, 1721 — империя ★', god:true},
{id:'r_ekater1', type:'ruler', label:'Екатерина I\n1725–1727', dates:'1725–1727', desc:'Жена Петра I. Реально управлял А.Д. Меншиков. Верховный тайный совет.', ege:'ЕГЭ: эпоха дворцовых переворотов'},
{id:'r_anna',    type:'ruler', label:'Анна Иоанновна\n1730–1740', dates:'1730–1740', desc:'Бироновщина. Кондиции Верховного тайного совета (отвергнуты). Война за польское наследство.', ege:'ЕГЭ: бироновщина, кондиции 1730'},
{id:'r_elizaveta',type:'ruler',label:'Елизавета Петровна\n1741–1762', dates:'1741–1762', desc:'Дочь Петра I. Основан МГУ (1755). Участие в Семилетней войне. Отменила смертную казнь.', ege:'ЕГЭ: 1755 — МГУ, Семилетняя война 1756–1763'},
{id:'r_peter3',  type:'ruler', label:'Пётр III\n1762', dates:'1762', desc:'Манифест о вольности дворянства (1762). Вышел из Семилетней войны. Убит в результате переворота.', ege:'ЕГЭ: 1762 — Манифест о вольности дворянства'},
{id:'r_ekater2', type:'ruler', label:'Екатерина II\n1762–1796', dates:'1762–1796', desc:'«Великая». Просвещённый абсолютизм. Жалованные грамоты дворянству и городам (1785). Пугачёвщина (1773–1775). Разделы Польши. Крым (1783).', ege:'ЕГЭ: 1773–75 — Пугачёв ★, 1785 — грамоты, 1783 — Крым', god:true},
{id:'r_pavel1',  type:'ruler', label:'Павел I\n1796–1801', dates:'1796–1801', desc:'Закон о престолонаследии (1797). Ограничение барщины (3 дня). Антифранцузская коалиция. Убит заговорщиками.', ege:'ЕГЭ: 1797 — закон о престолонаследии, итальянский поход Суворова'},
{id:'r_alex1',   type:'ruler', label:'Александр I\n1801–1825', dates:'1801–1825', desc:'Либеральные реформы начала царствования. Сперанский. Отечественная война 1812 г. Священный союз. Аракчеевщина.', ege:'ЕГЭ: 1812 — Бородино ★, Венский конгресс 1815', god:true},

function nc(n){
  const s=T[n.type]||T.event;
  if(n.god) return {background:'#3b2d00',border:'#e3b341',highlight:{background:'#5c4500',border:'#fff700'}};
  return {background:s.bg,border:s.c,highlight:{background:s.bg,border:s.c}};
}

  id:n.id, label:n.label, title:n.desc||'',
  color:nc(n),
  font:{color:n.god?'#e3b341':(T[n.type]?.c||'#e6edf3'),size:n.god?14:12,face:'sans-serif'},
  size:n.god?26:(n.type==='dynasty'?22:n.type==='period'?20:14),
  shape:n.god?'star':n.type==='dynasty'?'square':n.type==='period'?'hexagon':n.type==='war'?'triangle':'dot',
  _d:n,
})));

const visEdges=new vis.DataSet(EDGES.map((e,i)=>({
  id:i,from:e.from,to:e.to,
  label:e.label||'',
  color:{color:'#3b434e',highlight:'#8b949e'},
  font:{color:'#6e7681',size:9,align:'middle'},
  arrows:{to:{enabled:true,scaleFactor:0.5}},
  width:1.2,
  _d:e,
})));

const net=new vis.Network(
  document.getElementById('graph'),
  {nodes:visNodes,edges:visEdges},
  {
    physics:{enabled:true,solver:'forceAtlas2Based',
      forceAtlas2Based:{gravitationalConstant:-80,centralGravity:0.003,springLength:130,springConstant:0.06},
      stabilization:{iterations:300}},
    interaction:{hover:true,tooltipDelay:300},
    edges:{smooth:{type:'dynamic'}},
  }
);

// expose globally for buttons
window.network=net;

// stats
function upStats(){
  document.getElementById('stats').textContent=`${visNodes.length} узлов · ${visEdges.length} связей`;
}
upStats();

// ── CLICK ──
net.on('click',params=>{
  if(!params.nodes.length){
    document.getElementById('nd').innerHTML='<div class="ph"><div class="ico">👑</div>Кликните на узел</div>';
    return;
  }
  const nid=params.nodes[0];
  const nd=NODES.find(n=>n.id===nid);
  if(!nd)return;

  const s=T[nd.type]||T.event;
  const outE=EDGES.filter(e=>e.from===nid);
  const inE =EDGES.filter(e=>e.to===nid);

  function eRow(e,dir){
    const oid=dir==='out'?e.to:e.from;
    const on=NODES.find(n=>n.id===oid);
    const oc=T[on?.type]?.c||'#8b949e';
    return `<div class="ei"><span style="color:${oc};font-weight:600">${on?.label?.split('\n')[0]||oid}</span><span class="el">${e.label||''}</span></div>`;
  }

  document.getElementById('nd').innerHTML=`
    <div class="dt">${nd.label.replace('\n',' ')}</div>
    <span class="dtype" style="background:${s.bg};color:${s.c}">${{ruler:'ПРАВИТЕЛЬ',dynasty:'ДИНАСТИЯ',event:'СОБЫТИЕ',reform:'РЕФОРМА',period:'ПЕРИОД',war:'ВОЙНА'}[nd.type]||nd.type.toUpperCase()}${nd.god?' ★ GOD NODE':''}</span>
    ${nd.dates?`<div class="ddate">📅 ${nd.dates}</div>`:''}
    <div class="ddesc">${nd.desc||''}</div>
    ${nd.ege?`<div style="background:#161b22;border-left:3px solid #e3b341;padding:6px 10px;border-radius:4px;font-size:11px;color:#e3b341;margin-bottom:10px;line-height:1.5">🎯 ${nd.ege}</div>`:''}
    <div class="dsec"><h4>→ Связи (${outE.length})</h4>${outE.map(e=>eRow(e,'out')).join('')||'<span style="color:#3b434e;font-size:11px">—</span>'}</div>
    <div class="dsec"><h4>← Входящие (${inE.length})</h4>${inE.map(e=>eRow(e,'in')).join('')||'<span style="color:#3b434e;font-size:11px">—</span>'}</div>
  `;

  net.focus(nid,{scale:1.3,animation:{duration:500,easingFunction:'easeInOutQuad'}});
});

// ── SEARCH ──
document.getElementById('search').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  if(!q){visNodes.forEach(n=>visNodes.update({id:n.id,hidden:false}));return;}
  visNodes.forEach(n=>{
    const d=n._d;
    const m=n.label.toLowerCase().includes(q)||(d?.desc||'').toLowerCase().includes(q)||(d?.dates||'').includes(q);
    visNodes.update({id:n.id,hidden:!m});
  });
});

// ── TYPE FILTERS ──
const active=new Set(['ruler','dynasty','event','reform','period','war']);
document.getElementById('filters').addEventListener('click',e=>{
  const btn=e.target.closest('.fb');if(!btn)return;
  const tp=btn.dataset.type;
  if(active.has(tp))active.delete(tp);else active.add(tp);
  btn.classList.toggle('active',active.has(tp));
  NODES.forEach(n=>visNodes.update({id:n.id,hidden:!active.has(n.type)}));
});

// ── TIMELINE ──
const TL=[
  {label:'862\nРюрик',id:'r_ryurik'},{label:'988\nКрещение',id:'e_kreshenie'},
  {label:'1019\nЯрослав',id:'r_yaroslav'},{label:'1237\nОрда',id:'p_orda'},
  {label:'1380\nКуликово',id:'e_kulikov'},{label:'1480\nКонец ига',id:'e_ugra'},
  {label:'1547\nИван IV',id:'r_ivan4'},{label:'1613\nРомановы',id:'r_mikhail'},
  {label:'1649\nСоборное\nуложение',id:'e_sobor1649'},{label:'1682\nПётр I',id:'r_peter1'},
  {label:'1709\nПолтава',id:'e_poltava'},{label:'1812\nБородино',id:'e_borodino'},
  {label:'1825\nДекабристы',id:'e_dekabr'},{label:'1861\nОтмена\nкрепостного',id:'e_1861'},
  {label:'1905\nРеволюция',id:'e_rev1905'},{label:'1917\nОктябрь',id:'e_rev1917'},
  {label:'1941\nВОВ',id:'e_vov'},{label:'1961\nГагарин',id:'e_gagarin'},
  {label:'1991\nРаспад\nСССР',id:'e_ussr_end'},
];

const tlEl=document.getElementById('tl');
TL.forEach((t,i)=>{
  if(i>0){const sep=document.createElement('span');sep.className='tp-sep';sep.textContent='›';tlEl.appendChild(sep);}
  const btn=document.createElement('button');
  btn.className='tp';btn.textContent=t.label;
  btn.onclick=()=>{
    document.querySelectorAll('.tp').forEach(b=>b.classList.remove('sel'));
    btn.classList.add('sel');
    net.focus(t.id,{scale:1.5,animation:{duration:600,easingFunction:'easeInOutQuad'}});
    net.selectNodes([t.id]);
    net.emit('click',{nodes:[t.id],edges:[]});
  };
  tlEl.appendChild(btn);
});

net.once('stabilizationIterationsDone',()=>{
  net.setOptions({physics:{enabled:false}});
  net.fit({animation:{duration:800}});
});
</script>
</body>
</html>
